name: 'Infra Tools'
description: 'Environment detection, kustomize diff rendering, and reference validation for infra-deployments PRs'
author: 'konflux-infra'

inputs:
  command:
    description: 'Command to run: env-detector, render-diff, or validate-refs'
    required: true
  repo-root:
    description: 'Path to the repository root (default: auto-detect)'
    required: false
    default: '.'
  base-ref:
    description: 'Base git ref to compare against'
    required: false
  pr-number:
    description: 'Pull request number (for labeling/commenting)'
    required: false
  github-token:
    description: 'GitHub token for API operations'
    required: false
    default: ${{ github.token }}
  overlays-dir:
    description: 'Path to overlays directory relative to repo root'
    required: false
    default: 'argo-cd-apps/overlays'
  output-mode:
    description: 'Output mode for render-diff: local, ci-summary, ci-comment, ci-artifact-dir (comma-separated)'
    required: false
    default: 'local'
  output-dir:
    description: 'Output directory for render-diff artifacts'
    required: false
  log-file:
    description: 'Write debug logs to this file (env-detector, render-diff only)'
    required: false
  cluster-labels:
    description: 'Include cluster/<name> labels (env-detector)'
    required: false
    default: 'false'
  dry-run:
    description: 'Print results without calling GitHub API (env-detector)'
    required: false
    default: 'false'
  enforce-ring-deployment:
    description: 'Fail when both staging and production overlays are directly modified (env-detector)'
    required: false
    default: 'false'
  ring-report-file:
    description: 'Write ring deployment check result to this file (env-detector)'
    required: false
  # validate-refs specific inputs
  root:
    description: 'Root directory to validate (validate-refs)'
    required: false
  verbose:
    description: 'Show all checked directories (validate-refs)'
    required: false
    default: 'false'
  # render-diff specific inputs
  detection-mode:
    description: 'Detection mode for render-diff: appset or direct'
    required: false
    default: 'appset'
  components-dir:
    description: 'Components directory for direct mode (render-diff)'
    required: false
    default: 'components'

outputs:
  affected-environments:
    description: 'JSON array of affected environment names (env-detector)'
  affected-clusters:
    description: 'JSON array of affected cluster names (env-detector)'
  labels:
    description: 'JSON array of labels that would be applied (env-detector)'

runs:
  using: 'docker'
  image: 'docker://quay.io/aurelbalteaux/infra-tools:latest'
  env:
    COMMAND: ${{ inputs.command }}
    REPO_ROOT: ${{ inputs.repo-root }}
    BASE_REF: ${{ inputs.base-ref }}
    PR_NUMBER: ${{ inputs.pr-number }}
    GITHUB_TOKEN: ${{ inputs.github-token }}
    OVERLAYS_DIR: ${{ inputs.overlays-dir }}
    OUTPUT_MODE: ${{ inputs.output-mode }}
    OUTPUT_DIR: ${{ inputs.output-dir }}
    LOG_FILE: ${{ inputs.log-file }}
    CLUSTER_LABELS: ${{ inputs.cluster-labels }}
    DRY_RUN: ${{ inputs.dry-run }}
    ENFORCE_RING_DEPLOYMENT: ${{ inputs.enforce-ring-deployment }}
    RING_REPORT_FILE: ${{ inputs.ring-report-file }}
    ROOT: ${{ inputs.root }}
    VERBOSE: ${{ inputs.verbose }}
    DETECTION_MODE: ${{ inputs.detection-mode }}
    COMPONENTS_DIR: ${{ inputs.components-dir }}

branding:
  icon: 'git-pull-request'
  color: 'blue'
